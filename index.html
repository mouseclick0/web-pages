<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>웹 애플리케이션</title>
  <script>
    (function () {
      try {
        var key = "web-pages-theme";
        var stored = localStorage.getItem(key);
        if (stored === "light" || stored === "dark") {
          document.documentElement.setAttribute("data-theme", stored);
        } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
          document.documentElement.setAttribute("data-theme", "light");
        } else {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1419;
      --surface: #1a2332;
      --text: #e8eef5;
      --muted: #8b9cb0;
      --accent: #3d9cf5;
      --accent-glow: rgba(61, 156, 245, 0.35);
      --card-border: rgba(255, 255, 255, 0.05);
      --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
      --grad-a: rgba(61, 156, 245, 0.12);
      --grad-b: rgba(232, 93, 93, 0.06);
      --toggle-bg: rgba(255, 255, 255, 0.08);
      --toggle-border: rgba(255, 255, 255, 0.12);
      --toggle-hover: rgba(255, 255, 255, 0.12);
    }

    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #e8eef3;
      --surface: #ffffff;
      --text: #14212e;
      --muted: #5a6b7d;
      --accent: #1d7ed6;
      --accent-glow: rgba(29, 126, 214, 0.25);
      --card-border: rgba(15, 30, 50, 0.08);
      --card-shadow: 0 8px 32px rgba(20, 40, 70, 0.1);
      --grad-a: rgba(61, 156, 245, 0.18);
      --grad-b: rgba(232, 93, 93, 0.05);
      --toggle-bg: rgba(20, 40, 70, 0.06);
      --toggle-border: rgba(20, 40, 70, 0.12);
      --toggle-hover: rgba(20, 40, 70, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans KR", "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -20%, var(--grad-a), transparent),
        radial-gradient(ellipse 80% 50% at 100% 50%, var(--grad-b), transparent);
      transition: background-color 0.25s ease, color 0.2s ease;
    }

    [hidden] {
      display: none !important;
    }

    .card {
      width: min(100%, 520px);
      background: var(--surface);
      border-radius: 20px;
      padding: 2rem 1.75rem;
      box-shadow: var(--card-shadow), 0 0 0 1px var(--card-border);
      transition: background-color 0.25s ease, box-shadow 0.25s ease;
    }

    .home-grid {
      width: min(100%, 1080px);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1.25rem;
    }

    .home-card {
      text-align: center;
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.35rem;
    }

    .card-head h1 {
      margin: 0;
      flex: 1;
      min-width: 0;
    }

    .feature-hero {
      display: block;
      width: min(100%, 17rem);
      height: auto;
      margin: 0 auto 1.1rem;
      filter: drop-shadow(0 12px 28px rgba(0, 0, 0, 0.22));
    }

    .home-subtitle {
      max-width: 24rem;
      margin: 0 auto 1.75rem;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .cutout-hero {
      color: var(--accent);
    }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 10;
      width: auto;
      min-width: 7.5rem;
      margin: 0;
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      box-shadow: none;
      border-radius: 10px;
    }

    .theme-toggle:hover {
      filter: none;
      background: var(--toggle-hover);
      box-shadow: none;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 1.75rem;
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
      min-height: 4rem;
    }

    .line {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      flex-wrap: wrap;
      animation: lineIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }

    .line:nth-child(1) { animation-delay: 0s; }
    .line:nth-child(2) { animation-delay: 0.06s; }
    .line:nth-child(3) { animation-delay: 0.12s; }
    .line:nth-child(4) { animation-delay: 0.18s; }
    .line:nth-child(5) { animation-delay: 0.24s; }

    @keyframes lineIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
    }

    .line-label {
      flex: 0 0 auto;
      width: 4.25rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
    }

    .balls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      flex: 1;
      justify-content: flex-start;
    }

    .ball {
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
      box-shadow:
        inset 0 -4px 8px rgba(0, 0, 0, 0.15),
        0 4px 12px rgba(0, 0, 0, 0.25);
      animation: pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }

    .ball:nth-child(1) { animation-delay: 0.02s; }
    .ball:nth-child(2) { animation-delay: 0.08s; }
    .ball:nth-child(3) { animation-delay: 0.14s; }
    .ball:nth-child(4) { animation-delay: 0.2s; }
    .ball:nth-child(5) { animation-delay: 0.26s; }
    .ball:nth-child(6) { animation-delay: 0.32s; }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(0.4);
      }
    }

    .ball.yellow { background: linear-gradient(145deg, #ffd54f, #e6a800); }
    .ball.blue { background: linear-gradient(145deg, #64b5f6, #1565c0); }
    .ball.red { background: linear-gradient(145deg, #ef9a9a, #c62828); }
    .ball.gray { background: linear-gradient(145deg, #b0bec5, #546e7a); }
    .ball.green { background: linear-gradient(145deg, #81c784, #2e7d32); }

    .placeholder {
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
      padding: 0.75rem 0;
    }

    .draw-btn,
    .entry-btn,
    .cutout-btn,
    .download-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 0.95rem 1.25rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(160deg, #4da3f7, #2563c7);
      box-shadow: 0 4px 20px var(--accent-glow);
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    }

    .draw-btn:hover,
    .entry-btn:hover,
    .cutout-btn:hover,
    .download-btn:hover {
      filter: brightness(1.06);
      box-shadow: 0 6px 28px var(--accent-glow);
    }

    .draw-btn:active,
    .entry-btn:active,
    .cutout-btn:active,
    .download-btn:active {
      transform: scale(0.98);
    }

    .upload-zone {
      display: grid;
      gap: 0.75rem;
      place-items: center;
      min-height: 11rem;
      margin-bottom: 1.25rem;
      padding: 1.5rem;
      border: 2px dashed var(--toggle-border);
      border-radius: 16px;
      color: var(--muted);
      text-align: center;
      background: var(--toggle-bg);
      cursor: pointer;
      transition: border-color 0.15s ease, background-color 0.15s ease;
    }

    .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--toggle-hover);
    }

    .upload-zone strong {
      color: var(--text);
      font-size: 1rem;
    }

    .upload-zone input {
      display: none;
    }

    .cutout-controls {
      display: grid;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .range-label {
      display: grid;
      gap: 0.45rem;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .range-label span {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 400;
    }

    .range-input {
      width: 100%;
      accent-color: var(--accent);
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .preview-panel {
      min-width: 0;
    }

    .preview-panel h2 {
      margin: 0 0 0.5rem;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .preview-box {
      overflow: hidden;
      border: 1px solid var(--card-border);
      border-radius: 14px;
      background:
        linear-gradient(45deg, rgba(255, 255, 255, 0.08) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255, 255, 255, 0.08) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255, 255, 255, 0.08) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255, 255, 255, 0.08) 75%);
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-size: 16px 16px;
    }

    .preview-box img,
    .preview-box canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    .cutout-status {
      min-height: 1.3rem;
      margin: 0 0 1rem;
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .back-btn {
      width: 100%;
      margin-top: 0.75rem;
      border: 1px solid var(--toggle-border);
      border-radius: 12px;
      padding: 0.85rem 1.25rem;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
      background: var(--toggle-bg);
      transition: background-color 0.15s ease, transform 0.15s ease;
    }

    .back-btn:hover {
      background: var(--toggle-hover);
    }

    .back-btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 760px) {
      body {
        align-items: flex-start;
        padding-top: 4.5rem;
      }

      .home-grid {
        grid-template-columns: 1fr;
      }

      .preview-grid {
        grid-template-columns: 1fr;
      }
    }

    .hint {
      margin-top: 1.25rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <button type="button" class="theme-toggle" id="themeToggle" aria-label="화이트 모드로 전환">화이트 모드</button>

  <main class="home-grid" id="homeView">
    <section class="card home-card">
      <div class="card-head">
        <svg class="feature-hero" role="img" aria-label="로또 번호 공 이미지" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="ticketGradient" x1="42" y1="38" x2="244" y2="154" gradientUnits="userSpaceOnUse">
              <stop stop-color="#fff7d6" />
              <stop offset="1" stop-color="#ffd166" />
            </linearGradient>
            <linearGradient id="blueBall" x1="150" y1="50" x2="238" y2="139" gradientUnits="userSpaceOnUse">
              <stop stop-color="#8fd3ff" />
              <stop offset="1" stop-color="#2563c7" />
            </linearGradient>
            <linearGradient id="redBall" x1="70" y1="68" x2="152" y2="151" gradientUnits="userSpaceOnUse">
              <stop stop-color="#ffb3b3" />
              <stop offset="1" stop-color="#d62828" />
            </linearGradient>
            <linearGradient id="greenBall" x1="202" y1="78" x2="278" y2="154" gradientUnits="userSpaceOnUse">
              <stop stop-color="#a7f3d0" />
              <stop offset="1" stop-color="#2e7d32" />
            </linearGradient>
          </defs>
          <rect x="50" y="42" width="178" height="94" rx="18" fill="url(#ticketGradient)" transform="rotate(-8 139 89)" />
          <rect x="76" y="67" width="80" height="10" rx="5" fill="#f59e0b" opacity="0.8" transform="rotate(-8 116 72)" />
          <rect x="78" y="89" width="126" height="8" rx="4" fill="#ffffff" opacity="0.7" transform="rotate(-8 141 93)" />
          <rect x="82" y="109" width="84" height="8" rx="4" fill="#ffffff" opacity="0.7" transform="rotate(-8 124 113)" />
          <circle cx="184" cy="95" r="47" fill="url(#blueBall)" />
          <circle cx="184" cy="95" r="34" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.9" />
          <text x="184" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">7</text>
          <circle cx="108" cy="116" r="36" fill="url(#redBall)" />
          <circle cx="108" cy="116" r="25" fill="none" stroke="#ffffff" stroke-width="7" opacity="0.9" />
          <text x="108" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">23</text>
          <circle cx="247" cy="123" r="33" fill="url(#greenBall)" />
          <circle cx="247" cy="123" r="23" fill="none" stroke="#ffffff" stroke-width="7" opacity="0.9" />
          <text x="247" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">45</text>
        </svg>
      </div>
      <p class="home-subtitle">6/45 로또 번호를 한 번에 5게임까지 추천합니다.</p>
      <button type="button" class="entry-btn" id="openLottoBtn">로또 번호 생성기</button>
    </section>

    <section class="card home-card">
      <div class="card-head">
        <svg class="feature-hero cutout-hero" role="img" aria-label="이미지 배경 제거 아이콘" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
          <rect x="54" y="36" width="212" height="132" rx="24" fill="currentColor" opacity="0.16" />
          <rect x="78" y="58" width="164" height="92" rx="16" fill="#ffffff" opacity="0.18" />
          <path d="M103 130l38-42 30 29 19-22 44 35H103z" fill="currentColor" opacity="0.55" />
          <circle cx="207" cy="82" r="17" fill="#ffd54f" />
          <path d="M96 54l128 96" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.95" />
          <path d="M114 53h-22v22" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
          <path d="M206 151h22v-22" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
        </svg>
      </div>
      <p class="home-subtitle">단색 배경 이미지를 업로드해 배경을 투명하게 제거합니다.</p>
      <button type="button" class="entry-btn" id="openCutoutBtn">이미지 누끼 제거</button>
    </section>
  </main>

  <main class="card" id="lottoView" hidden>
    <div class="card-head">
      <h1>로또 번호 생성기</h1>
    </div>
    <p class="subtitle">한 번에 게임 5개(각 6개 번호)를 무작위로 뽑습니다. (6/45)</p>

    <div class="results" id="results" aria-live="polite">
      <span class="placeholder" id="placeholder">아래 버튼을 눌러 5게임을 생성하세요.</span>
    </div>

    <button type="button" class="draw-btn" id="drawBtn">번호 생성하기</button>
    <button type="button" class="back-btn" id="backHomeBtn">메인페이지로 돌아가기</button>

    <p class="hint">이 페이지는 참고용이며, 당첨을 보장하지 않습니다.</p>
  </main>

  <main class="card" id="cutoutView" hidden>
    <div class="card-head">
      <h1>이미지 누끼 제거</h1>
    </div>
    <p class="subtitle">흰색 또는 단색 배경 이미지에 적합합니다. 이미지를 드롭하거나 업로드한 뒤 강도를 조절하세요.</p>

    <label class="upload-zone" id="uploadZone" for="imageInput">
      <strong>이미지를 드롭하거나 클릭해서 업로드</strong>
      <span>JPG, PNG, WebP 이미지를 지원합니다.</span>
      <input type="file" id="imageInput" accept="image/*" />
    </label>

    <div class="cutout-controls">
      <label class="range-label" for="toleranceInput">
        제거 강도
        <span><span>낮음</span><span id="toleranceValue">38</span><span>높음</span></span>
        <input class="range-input" id="toleranceInput" type="range" min="5" max="120" value="38" />
      </label>
      <button type="button" class="cutout-btn" id="removeBgBtn" disabled>배경 제거하기</button>
    </div>

    <p class="cutout-status" id="cutoutStatus">이미지를 업로드하면 원본과 결과가 표시됩니다.</p>

    <div class="preview-grid" id="previewGrid" hidden>
      <div class="preview-panel">
        <h2>원본</h2>
        <div class="preview-box">
          <img id="originalPreview" alt="업로드한 원본 이미지" />
        </div>
      </div>
      <div class="preview-panel">
        <h2>결과</h2>
        <div class="preview-box">
          <canvas id="resultCanvas"></canvas>
        </div>
      </div>
    </div>

    <button type="button" class="download-btn" id="downloadCutoutBtn" disabled>PNG 다운로드</button>
    <button type="button" class="back-btn" id="backHomeFromCutoutBtn">메인페이지로 돌아가기</button>
  </main>

  <script>
    function pickLottoNumbers() {
      const pool = Array.from({ length: 45 }, (_, i) => i + 1);
      const picked = [];

      for (let i = 0; i < 6; i++) {
        const idx = Math.floor(Math.random() * pool.length);
        picked.push(pool[idx]);
        pool.splice(idx, 1);
      }

      return picked.sort((a, b) => a - b);
    }

    function ballClass(n) {
      if (n <= 10) return "yellow";
      if (n <= 20) return "blue";
      if (n <= 30) return "red";
      if (n <= 40) return "gray";
      return "green";
    }

    const THEME_KEY = "web-pages-theme";

    function getTheme() {
      return document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark";
    }

    function setTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      try {
        localStorage.setItem(THEME_KEY, theme);
      } catch (e) {}

      var btn = document.getElementById("themeToggle");
      if (!btn) return;
      if (theme === "light") {
        btn.textContent = "다크 모드";
        btn.setAttribute("aria-label", "다크 모드로 전환");
      } else {
        btn.textContent = "화이트 모드";
        btn.setAttribute("aria-label", "화이트 모드로 전환");
      }
    }

    document.getElementById("themeToggle").addEventListener("click", function () {
      setTheme(getTheme() === "dark" ? "light" : "dark");
    });

    setTheme(getTheme());

    const homeView = document.getElementById("homeView");
    const lottoView = document.getElementById("lottoView");
    const cutoutView = document.getElementById("cutoutView");
    const openLottoBtn = document.getElementById("openLottoBtn");
    const openCutoutBtn = document.getElementById("openCutoutBtn");
    const backHomeBtn = document.getElementById("backHomeBtn");
    const backHomeFromCutoutBtn = document.getElementById("backHomeFromCutoutBtn");
    const resultsEl = document.getElementById("results");
    const drawBtn = document.getElementById("drawBtn");
    const uploadZone = document.getElementById("uploadZone");
    const imageInput = document.getElementById("imageInput");
    const toleranceInput = document.getElementById("toleranceInput");
    const toleranceValue = document.getElementById("toleranceValue");
    const removeBgBtn = document.getElementById("removeBgBtn");
    const downloadCutoutBtn = document.getElementById("downloadCutoutBtn");
    const cutoutStatus = document.getElementById("cutoutStatus");
    const previewGrid = document.getElementById("previewGrid");
    const originalPreview = document.getElementById("originalPreview");
    const resultCanvas = document.getElementById("resultCanvas");

    const GAME_COUNT = 5;
    let sourceImage = null;
    let sourceFileName = "cutout";

    function showView(view) {
      homeView.hidden = view !== homeView;
      lottoView.hidden = view !== lottoView;
      cutoutView.hidden = view !== cutoutView;
    }

    function setCutoutStatus(message) {
      cutoutStatus.textContent = message;
    }

    function loadImageFile(file) {
      if (!file || !file.type.startsWith("image/")) {
        setCutoutStatus("이미지 파일을 선택해 주세요.");
        return;
      }

      const reader = new FileReader();
      reader.onload = function () {
        const img = new Image();
        img.onload = function () {
          sourceImage = img;
          sourceFileName = file.name.replace(/\.[^.]+$/, "") || "cutout";
          originalPreview.src = img.src;
          previewGrid.hidden = false;
          removeBgBtn.disabled = false;
          downloadCutoutBtn.disabled = true;
          setCutoutStatus("이미지를 불러왔습니다. 배경 제거하기 버튼을 눌러 주세요.");

          const ctx = resultCanvas.getContext("2d");
          resultCanvas.width = img.naturalWidth;
          resultCanvas.height = img.naturalHeight;
          ctx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
          ctx.drawImage(img, 0, 0);
        };
        img.onerror = function () {
          setCutoutStatus("이미지를 불러오지 못했습니다.");
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    }

    function colorDistance(a, b) {
      const dr = a[0] - b[0];
      const dg = a[1] - b[1];
      const db = a[2] - b[2];
      return Math.sqrt(dr * dr + dg * dg + db * db);
    }

    function sampleBackgroundColor(data, width, height) {
      const points = [
        [0, 0],
        [width - 1, 0],
        [0, height - 1],
        [width - 1, height - 1]
      ];
      const sum = [0, 0, 0];

      points.forEach(([x, y]) => {
        const i = (y * width + x) * 4;
        sum[0] += data[i];
        sum[1] += data[i + 1];
        sum[2] += data[i + 2];
      });

      return sum.map((value) => value / points.length);
    }

    function removeBackground() {
      if (!sourceImage) return;

      const ctx = resultCanvas.getContext("2d", { willReadFrequently: true });
      const width = sourceImage.naturalWidth;
      const height = sourceImage.naturalHeight;
      const tolerance = Number(toleranceInput.value);
      const softEdge = 24;

      resultCanvas.width = width;
      resultCanvas.height = height;
      ctx.drawImage(sourceImage, 0, 0);

      const imageData = ctx.getImageData(0, 0, width, height);
      const data = imageData.data;
      const bg = sampleBackgroundColor(data, width, height);

      for (let i = 0; i < data.length; i += 4) {
        const pixel = [data[i], data[i + 1], data[i + 2]];
        const distance = colorDistance(pixel, bg);

        if (distance <= tolerance) {
          data[i + 3] = 0;
        } else if (distance <= tolerance + softEdge) {
          const alphaRatio = (distance - tolerance) / softEdge;
          data[i + 3] = Math.round(data[i + 3] * alphaRatio);
        }
      }

      ctx.putImageData(imageData, 0, 0);
      downloadCutoutBtn.disabled = false;
      setCutoutStatus("배경 제거가 완료되었습니다. 결과가 어색하면 제거 강도를 조절해 다시 실행해 주세요.");
    }

    function downloadCutout() {
      const link = document.createElement("a");
      link.download = sourceFileName + "-cutout.png";
      link.href = resultCanvas.toDataURL("image/png");
      link.click();
    }

    openLottoBtn.addEventListener("click", () => {
      showView(lottoView);
      drawBtn.focus();
    });

    backHomeBtn.addEventListener("click", () => {
      showView(homeView);
      openLottoBtn.focus();
    });

    openCutoutBtn.addEventListener("click", () => {
      showView(cutoutView);
      imageInput.focus();
    });

    backHomeFromCutoutBtn.addEventListener("click", () => {
      showView(homeView);
      openCutoutBtn.focus();
    });

    imageInput.addEventListener("change", () => {
      loadImageFile(imageInput.files[0]);
    });

    ["dragenter", "dragover"].forEach((eventName) => {
      uploadZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        uploadZone.classList.add("drag-over");
      });
    });

    ["dragleave", "drop"].forEach((eventName) => {
      uploadZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        uploadZone.classList.remove("drag-over");
      });
    });

    uploadZone.addEventListener("drop", (event) => {
      loadImageFile(event.dataTransfer.files[0]);
    });

    toleranceInput.addEventListener("input", () => {
      toleranceValue.textContent = toleranceInput.value;
    });

    removeBgBtn.addEventListener("click", removeBackground);
    downloadCutoutBtn.addEventListener("click", downloadCutout);

    drawBtn.addEventListener("click", () => {
      resultsEl.innerHTML = "";

      for (let g = 0; g < GAME_COUNT; g++) {
        const nums = pickLottoNumbers();

        const line = document.createElement("div");
        line.className = "line";

        const label = document.createElement("span");
        label.className = "line-label";
        label.textContent = "게임 " + (g + 1);

        const row = document.createElement("div");
        row.className = "balls";

        nums.forEach((n, i) => {
          const span = document.createElement("span");
          span.className = "ball " + ballClass(n);
          span.textContent = n;
          span.style.animationDelay = (g * 0.06 + i * 0.05) + "s";
          row.appendChild(span);
        });

        line.appendChild(label);
        line.appendChild(row);
        resultsEl.appendChild(line);
      }
    });
  </script>
</body>
</html>
